name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_deploy:
    if: ${{ github.repository == 'primer/brand' }}
    name: Production
    # SHA for security hardening. Points at 2.4.0 release
    uses: primer/.github/.github/workflows/deploy.yml@2bbbbf004e8281856e08f6607eb46a7ee59e65ed # v2.4.0
    with:
      node_version: 24
      install: npm ci
      build: |
        export NEXT_PUBLIC_SITE_TITLE='Primer'
        export NEXT_PUBLIC_REPO='https://github.com/primer/brand'
        export NEXT_PUBLIC_REPO_SRC_PATH='apps/next-docs'
        npm run build
      output_dir: apps/next-docs/out/
