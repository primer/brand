<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>.scale{display:flex;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-default)}
.scale div{flex:1;height:64px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;font-family:var(--font-mono);font-size:9px}</style></head>
<body>
<div class="label" style="margin-bottom:8px">Green — primary brand scale (Primer)</div>
<div class="scale">
  <div style="background:#EBF9F4;color:#0D3024">0</div><div style="background:#BFFFD1;color:#0D3024">1</div>
  <div style="background:#8CF2A6;color:#0D3024">2</div><div style="background:#5FED83;color:#0D3024">3</div>
  <div style="background:#23EA57;color:#0D3024">4</div><div style="background:#0FBF3E;color:#fff">5</div>
  <div style="background:#08872B;color:#fff">6</div><div style="background:#0D6731;color:#fff">7</div>
  <div style="background:#0E4A2E;color:#fff">8</div><div style="background:#0D3024;color:#8CF2A6">9</div>
</div>
<div class="label" style="margin:14px 0 8px">Lime</div>
<div class="scale">
  <div style="background:#F3FEC8">0</div><div style="background:#E8FC97">1</div><div style="background:#DCFA67">2</div>
  <div style="background:#D1F441">3</div><div style="background:#B2DE28">4</div><div style="background:#92C219;color:#fff">5</div>
  <div style="background:#698E17;color:#fff">6</div><div style="background:#425E13;color:#fff">7</div>
  <div style="background:#2C440B;color:#fff">8</div><div style="background:#182C01;color:#DCFA67">9</div>
</div>
</body></html>
