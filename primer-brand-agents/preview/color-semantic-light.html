<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>.item{display:flex;align-items:center;gap:10px}.dot{width:30px;height:30px;border-radius:6px;border:1px solid var(--border-default);flex:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 22px}.t{display:flex;flex-direction:column;line-height:1.25}.t b{font-weight:500;font-size:13px}</style></head>
<body>
<div class="label" style="margin-bottom:10px">Semantic tokens — Light</div>
<div class="grid">
  <div class="item"><div class="dot" style="background:#000"></div><div class="t"><b>fg-default</b><span class="tok">#000000</span></div></div>
  <div class="item"><div class="dot" style="background:#58635B"></div><div class="t"><b>fg-muted</b><span class="tok">#58635B</span></div></div>
  <div class="item"><div class="dot" style="background:#08872B"></div><div class="t"><b>fg-emphasis</b><span class="tok">#08872B</span></div></div>
  <div class="item"><div class="dot" style="background:#005DD5"></div><div class="t"><b>fg-link</b><span class="tok">#005DD5</span></div></div>
  <div class="item"><div class="dot" style="background:#CF222E"></div><div class="t"><b>fg-error</b><span class="tok">#CF222E</span></div></div>
  <div class="item"><div class="dot" style="background:#FFFFFF"></div><div class="t"><b>canvas-default</b><span class="tok">#FFFFFF</span></div></div>
  <div class="item"><div class="dot" style="background:#F2F5F3"></div><div class="t"><b>canvas-subtle</b><span class="tok">#F2F5F3</span></div></div>
  <div class="item"><div class="dot" style="background:#D2D9D4"></div><div class="t"><b>border-default</b><span class="tok">#D2D9D4</span></div></div>
</div>
</body></html>
