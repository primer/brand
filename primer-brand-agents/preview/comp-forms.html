<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.field{display:flex;flex-direction:column;gap:6px;max-width:320px}
.field label{font-size:13px;font-weight:500}
.field input{font-family:var(--font-sans);font-size:14px;padding:9px 12px;border-radius:6px;border:1px solid var(--border-default);background:#fff;color:#000}
.field input::placeholder{color:#8C998F}
.field input:focus{outline:none;border-color:#005DD5;box-shadow:0 0 0 3px rgba(0,93,213,.15)}
.tag{font-family:var(--font-mono);font-size:11px;padding:4px 9px;border-radius:999px;border:1px solid var(--border-default);background:var(--canvas-subtle);color:var(--fg-muted)}
</style></head>
<body>
<div class="label" style="margin-bottom:11px">Form input · eyebrow · topic pills</div>
<div class="row" style="gap:24px;align-items:flex-start">
  <div class="field"><label>Work email</label><input placeholder="you@company.com"></div>
  <div class="col" style="gap:12px">
    <span class="t-eyebrow">EXPLORE<span class="eyebrow-cursor"></span></span>
    <div class="row" style="gap:8px"><span class="tag">copilot</span><span class="tag">actions</span><span class="tag">codespaces</span></div>
  </div>
</div>
<div class="tok" style="margin-top:14px">Sentence case for labels &amp; copy · UPPERCASE only on mono eyebrows · lowercase topic tags</div>
</body></html>
