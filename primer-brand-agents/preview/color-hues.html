<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>.scale{display:flex;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-default);margin-bottom:13px}
.scale div{flex:1;height:54px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-family:var(--font-mono);font-size:9px}</style></head>
<body>
<div class="label" style="margin-bottom:7px">Blue</div>
<div class="scale"><div style="background:#DDF4FF">0</div><div style="background:#BCECFF">1</div><div style="background:#8DD6FF">2</div><div style="background:#5FB9FF">3</div><div style="background:#3094FF;color:#fff">4</div><div style="background:#0377FF;color:#fff">5</div><div style="background:#0055D5;color:#fff">6</div><div style="background:#0040A7;color:#fff">7</div><div style="background:#002F7A;color:#fff">8</div><div style="background:#001C4D;color:#8DD6FF">9</div></div>
<div class="label" style="margin-bottom:7px">Purple</div>
<div class="scale"><div style="background:#F0E5FF">0</div><div style="background:#DBBFFD">1</div><div style="background:#C898FD">2</div><div style="background:#B870FF;color:#fff">3</div><div style="background:#9F51FA;color:#fff">4</div><div style="background:#8534F3;color:#fff">5</div><div style="background:#6619E1;color:#fff">6</div><div style="background:#43179E;color:#fff">7</div><div style="background:#26115F;color:#fff">8</div><div style="background:#160048;color:#C898FD">9</div></div>
<div class="label" style="margin-bottom:7px">Red</div>
<div class="scale"><div style="background:#FFEBE9">0</div><div style="background:#FFCECB">1</div><div style="background:#FFABA8">2</div><div style="background:#FF8182">3</div><div style="background:#FA4549;color:#fff">4</div><div style="background:#CF2230;color:#fff">5</div><div style="background:#AE0B29;color:#fff">6</div><div style="background:#860620;color:#fff">7</div><div style="background:#730019;color:#fff">8</div><div style="background:#420011;color:#FFABA8">9</div></div>
<div class="label" style="margin-bottom:7px">Yellow</div>
<div class="scale"><div style="background:#FFF8C5">0</div><div style="background:#FFE777">1</div><div style="background:#FFD743">2</div><div style="background:#FABF21">3</div><div style="background:#DB9D00;color:#fff">4</div><div style="background:#BE7D00;color:#fff">5</div><div style="background:#A06100;color:#fff">6</div><div style="background:#824800;color:#fff">7</div><div style="background:#653200;color:#FFE777">8</div><div style="background:#471F00;color:#FFE777">9</div></div>
</body></html>
