<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>.box{width:120px;height:74px;border-radius:12px;background:var(--canvas-default);border:1px solid var(--border-muted);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--fg-muted)}</style></head>
<body>
<div class="label" style="margin-bottom:14px">Elevation — soft UI shadows + signature green glow</div>
<div class="row" style="gap:22px;padding:6px 4px 4px">
  <div class="box" style="box-shadow:var(--shadow-sm)">sm</div>
  <div class="box" style="box-shadow:var(--shadow-md)">md</div>
  <div class="box" style="box-shadow:var(--shadow-lg)">lg</div>
  <div class="box" style="box-shadow:var(--glow-green);border-color:var(--accent-green)">glow-green</div>
</div>
</body></html>
