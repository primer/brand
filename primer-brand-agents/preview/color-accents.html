<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>.sw{flex:1;height:78px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid var(--border-default)}
.sw span{font-family:var(--font-mono);font-size:11px}</style></head>
<body>
<div class="row" style="gap:10px">
  <div class="sw" style="background:#5FED83"><span style="color:#0D3024">Green 5FED83</span></div>
  <div class="sw" style="background:#08872B"><span style="color:#fff">Strong 08872B</span></div>
  <div class="sw" style="background:#3094FF"><span style="color:#fff">Blue 3094FF</span></div>
  <div class="sw" style="background:#8534F3"><span style="color:#fff">Purple 8534F3</span></div>
  <div class="sw" style="background:#000"><span style="color:#5FED83">Black 000000</span></div>
</div>
<div class="label" style="margin-top:10px">Brand accents — green is the signature; purple reserved for product visuals</div>
</body></html>
