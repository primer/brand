<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>.scale{display:flex;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-default)}
.scale div{flex:1;height:64px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;font-family:var(--font-mono);font-size:9px}</style></head>
<body>
<div class="label" style="margin-bottom:8px">Neutrals — warm, faintly green-tinted grays</div>
<div class="scale">
  <div style="background:#FFFFFF;color:#58635B;border-right:1px solid #E4EBE6">0</div><div style="background:#FAFAFA;color:#58635B">1</div>
  <div style="background:#F2F5F3;color:#58635B">2</div><div style="background:#E4EBE6;color:#58635B">3</div>
  <div style="background:#D2D9D4;color:#38423E">4</div><div style="background:#B6BFB8;color:#fff">5</div>
  <div style="background:#8C998F;color:#fff">6</div><div style="background:#58635B;color:#fff">7</div>
  <div style="background:#38423E;color:#fff">8</div><div style="background:#191F1B;color:#B6BFB8">9</div>
</div>
<div class="label" style="margin:14px 0 8px">Dark canvases (Primer product)</div>
<div class="row" style="gap:10px">
  <div class="scale" style="flex:1"><div style="background:#0D1117;color:#8C998F">canvas #0D1117</div></div>
  <div class="scale" style="flex:1"><div style="background:#010409;color:#8C998F">inset #010409</div></div>
  <div class="scale" style="flex:1"><div style="background:#000;color:#5FED83">black #000</div></div>
</div>
</body></html>
