<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>.bar{background:var(--accent-green-strong);height:18px;border-radius:3px}.unit{display:flex;align-items:center;gap:10px}.unit .tok{width:74px}</style></head>
<body>
<div class="label" style="margin-bottom:9px">Spacing scale — 4px base</div>
<div class="col" style="gap:7px">
  <div class="unit"><span class="tok">4 / space-1</span><div class="bar" style="width:4px"></div></div>
  <div class="unit"><span class="tok">8 / space-2</span><div class="bar" style="width:8px"></div></div>
  <div class="unit"><span class="tok">16 / space-4</span><div class="bar" style="width:16px"></div></div>
  <div class="unit"><span class="tok">24 / space-6</span><div class="bar" style="width:24px"></div></div>
  <div class="unit"><span class="tok">40 / space-10</span><div class="bar" style="width:40px"></div></div>
  <div class="unit"><span class="tok">64 / space-16</span><div class="bar" style="width:64px"></div></div>
  <div class="unit"><span class="tok">96 / space-24</span><div class="bar" style="width:96px"></div></div>
  <div class="unit"><span class="tok">128 / space-32</span><div class="bar" style="width:128px"></div></div>
</div>
</body></html>
