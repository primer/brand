<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>body{background:#000;color:#fff}.item{display:flex;align-items:center;gap:10px}.dot{width:30px;height:30px;border-radius:6px;border:1px solid #262C28;flex:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 22px}.t{display:flex;flex-direction:column;line-height:1.25}.t b{font-weight:500;font-size:13px}.tok{color:#A4AEA6}.label{color:#A4AEA6}</style></head>
<body>
<div class="label" style="margin-bottom:10px">Semantic tokens — Dark</div>
<div class="grid">
  <div class="item"><div class="dot" style="background:#fff"></div><div class="t"><b>fg-default</b><span class="tok">#FFFFFF</span></div></div>
  <div class="item"><div class="dot" style="background:#A4AEA6"></div><div class="t"><b>fg-muted</b><span class="tok">#A4AEA6</span></div></div>
  <div class="item"><div class="dot" style="background:#5FED83"></div><div class="t"><b>fg-emphasis</b><span class="tok">#5FED83</span></div></div>
  <div class="item"><div class="dot" style="background:#5FB9FF"></div><div class="t"><b>fg-link</b><span class="tok">#5FB9FF</span></div></div>
  <div class="item"><div class="dot" style="background:#000;border-color:#262C28"></div><div class="t"><b>canvas-default</b><span class="tok">#000000</span></div></div>
  <div class="item"><div class="dot" style="background:#0D1117"></div><div class="t"><b>canvas-muted</b><span class="tok">#0D1117</span></div></div>
  <div class="item"><div class="dot" style="background:#0F1511"></div><div class="t"><b>canvas-subtle</b><span class="tok">#0F1511</span></div></div>
  <div class="item"><div class="dot" style="background:#262C28"></div><div class="t"><b>border-default</b><span class="tok">#262C28</span></div></div>
</div>
</body></html>
